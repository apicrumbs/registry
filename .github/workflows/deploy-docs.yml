name: Deploy Data Catalog to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'manifest.json'
      - 'scripts/build-docs.php'
      - 'src/Providers/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: json, mbstring

      - name: Generate Static Documentation
        run: php scripts/build-docs.php url=https://apicrumbs.github.io/registry

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
