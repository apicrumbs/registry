<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Global Registry | ApiCrumbs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f1a; scroll-behavior: smooth; }
        .copy-success { color: #10b981 !important; }
    </style>
</head>
<body class="text-slate-300 flex">
    <!-- Sidebar -->
    <nav class="w-72 h-screen sticky top-0 border-r border-slate-900 p-8 overflow-y-auto bg-[#0d111d]">
        <a href="https://apicrumbs.github.io/registry/" class="text-white font-black text-2xl mb-10 block italic tracking-tighter">ApiCrumbs<span class="text-blue-500">.</span></a>
        <input type="text" id="cSearch" placeholder="Filter 250+ crumbs..." class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-xs mb-8 outline-none focus:ring-1 ring-blue-500">
        <div id="sLinks"><div class='mb-6'><a href='https://apicrumbs.github.io/registry/category/geo.html' class='text-[10px] font-black text-blue-500 uppercase tracking-widest mb-3 hover:underline block'>Geo</a><a href='https://apicrumbs.github.io/registry/providers/geo-postcodes-io.html' class='block py-1 text-sm text-slate-400 hover:text-white transition'>Postcodes.io</a></div><div class='mb-6'><a href='https://apicrumbs.github.io/registry/category/weather.html' class='text-[10px] font-black text-blue-500 uppercase tracking-widest mb-3 hover:underline block'>Weather</a><a href='https://apicrumbs.github.io/registry/providers/weather-open-meteo.html' class='block py-1 text-sm text-slate-400 hover:text-white transition'>Open-Meteo</a></div></div>
    </nav>
    
    <main class="flex-1 min-h-screen flex flex-col">
        <header class="border-b border-slate-900 bg-slate-900/30 px-16 py-4 flex justify-between items-center text-[10px] font-mono tracking-widest uppercase">
            <div class="flex gap-8">
                <span>VER: <span class="text-white">1.0.0</span></span>
                <span>LAST UPDATED: <span class="text-white">2026-03-06</span></span>
            </div>
            <div class="font-black text-blue-500">✅ ACTIVE</div>
        </header>

        <div class="p-16 max-w-6xl flex-1">
            <h1 class='text-6xl font-black text-white mb-4 italic tracking-tighter'>DATA REGISTRY</h1><div class='grid md:grid-cols-2 gap-6 mt-12'>
    <a href='https://apicrumbs.github.io/registry/category/geo.html' class='p-8 rounded-2xl bg-slate-900/50 border border-slate-800 hover:border-blue-500 transition group'>
        <div class='text-blue-500 font-bold text-xs mb-2 tracking-widest'>SECTOR</div>
        <div class='text-3xl font-black text-white group-hover:text-blue-400'>Geo</div>
        <div class='text-slate-500 mt-2'>1 Verified Adapters →</div>
    </a>
    <a href='https://apicrumbs.github.io/registry/category/weather.html' class='p-8 rounded-2xl bg-slate-900/50 border border-slate-800 hover:border-blue-500 transition group'>
        <div class='text-blue-500 font-bold text-xs mb-2 tracking-widest'>SECTOR</div>
        <div class='text-3xl font-black text-white group-hover:text-blue-400'>Weather</div>
        <div class='text-slate-500 mt-2'>1 Verified Adapters →</div>
    </a></div>
        </div>

        <footer class="p-8 border-t border-slate-900 text-center text-[10px] text-slate-600 uppercase tracking-widest">
            &copy; 2026 ApiCrumbs Foundry • Built for the UK Compliance Roadmap
        </footer>
    </main>

    <script>
        // 1. Instant Search
        document.getElementById('cSearch').addEventListener('input', (e) => {
            const t = e.target.value.toLowerCase();
            document.querySelectorAll('#sLinks a').forEach(l => {
                l.style.display = l.textContent.toLowerCase().includes(t) ? 'block' : 'none';
            });
        });

        // 2. Copy to Clipboard Utility
        async function copyToClipboard(button, textId) {
            const text = document.getElementById(textId).innerText;
            try {
                await navigator.clipboard.writeText(text);
                const original = button.innerHTML;
                button.innerHTML = "COPIED!";
                button.classList.add('copy-success');
                setTimeout(() => {
                    button.innerHTML = original;
                    button.classList.remove('copy-success');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }
    </script>
</body></html>
